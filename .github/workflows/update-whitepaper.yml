name: Update Whitepaper PDF

on:
  push:
    paths:
      - 'docs/whitepapers/Supercomputing_0_Kernel_Storage_Virtualization/README.md'

permissions:
  contents: write

jobs:
  build-and-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Pandoc and TeX Live
        run: |
          sudo apt-get update
          sudo apt-get install -y pandoc texlive-xetex texlive-fonts-recommended texlive-plain-generic

      - name: Build PDF via Makefile
        working-directory: ./docs
        run: make whitepaper

      - name: Commit and Push updated PDF
        run: |
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/whitepapers/Supercomputing_0_Kernel_Storage_Virtualization/Ping_Long_AI_Supercomputing_0_Kernel_Storage_Architecture.pdf

          # Only commit if there are changes
          if ! git diff --staged --quiet; then
            git commit -m "docs: auto-update whitepaper PDF from README.md"
            git push
          else
            echo "No changes in PDF to commit."
          fi
